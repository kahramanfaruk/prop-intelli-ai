# PropIntelli AI (full local stack)
#
#   docker compose up --build
#
# Brings up the C# ingestion API, the Streamlit review UI, and a Python worker.
# The worker seeds the Silver store with the bundled sample exposés on startup,
# then *watches* the shared Bronze store and extracts any document the API
# ingests — so a file POSTed to the C# API is processed end to end. All services
# share one data volume, so the Bronze raw store and Silver database are common.

services:
  api:
    build:
      context: ./services
      dockerfile: IngestionApi/Dockerfile
    image: propintelli/ingestion-api
    environment:
      PROPINTELLI_DATA_DIR: /data
      ASPNETCORE_ENVIRONMENT: Development
    ports:
      - "8080:8080"
    volumes:
      - propintelli-data:/data

  worker:
    build:
      context: .
      dockerfile: docker/Dockerfile.python
    image: propintelli/worker
    environment:
      PROPINTELLI_DATA_DIR: /data
      PROPINTELLI_LLM_PROVIDER: none
    # Seed the store with the bundled samples, then watch Bronze for API uploads.
    command: ["watch", "--seed-dir", "/sample_data/raw", "--interval", "5"]
    volumes:
      - propintelli-data:/data
      - ./sample_data:/sample_data:ro

  ui:
    build:
      context: .
      dockerfile: docker/Dockerfile.streamlit
    image: propintelli/ui
    environment:
      PROPINTELLI_DATA_DIR: /data
      PROPINTELLI_LLM_PROVIDER: none
    ports:
      - "8501:8501"
    volumes:
      - propintelli-data:/data

volumes:
  propintelli-data:
